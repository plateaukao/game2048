<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #faf8ef;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    touch-action: none;
    user-select: none;
  }
  .container { text-align: center; }
  h1 { font-size: 64px; color: #776e65; margin-bottom: 8px; }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .scores { display: flex; gap: 8px; }
  .score-box {
    background: #bbada0;
    color: #fff;
    padding: 8px 20px;
    border-radius: 6px;
    font-size: 14px;
    text-align: center;
    min-width: 80px;
  }
  .score-box .label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
  .score-box .value { font-size: 22px; font-weight: bold; }
  .btn {
    background: #8f7a66;
    color: #f9f6f2;
    border: none;
    border-radius: 6px;
    padding: 10px 20px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn:hover { background: #9f8b77; }
  .board {
    position: relative;
    background: #bbada0;
    border-radius: 8px;
    padding: 12px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    width: 420px;
    height: 420px;
  }
  .cell {
    background: rgba(238,228,218,0.35);
    border-radius: 6px;
  }
  .tile {
    position: absolute;
    width: 87px;
    height: 87px;
    border-radius: 6px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    font-size: 38px;
    transition: top 0.12s ease, left 0.12s ease;
    z-index: 1;
  }
  .tile.merged { z-index: 2; }
  .tile.new {
    animation: pop 0.2s ease;
  }
  @keyframes pop {
    0% { transform: scale(0); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
  }
  .tile.merge-pop {
    animation: mergePop 0.2s ease;
    z-index: 2;
  }
  @keyframes mergePop {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }
  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(238,228,218,0.73);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
  }
  .overlay.hidden { display: none; }
  .overlay h2 { font-size: 48px; color: #776e65; margin-bottom: 16px; }
  .overlay.win { background: rgba(237,194,46,0.5); }
  .overlay.win h2 { color: #f9f6f2; }
  .message { font-size: 14px; color: #776e65; margin-top: 12px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>2048</h1>
    <div class="scores">
      <div class="score-box">
        <div class="label">Score</div>
        <div class="value" id="score">0</div>
      </div>
      <div class="score-box">
        <div class="label">Best</div>
        <div class="value" id="best">0</div>
      </div>
    </div>
  </div>
  <div style="margin-bottom:12px;text-align:right;">
    <button class="btn" onclick="game.reset()">New Game</button>
  </div>
  <div class="board" id="board">
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="overlay hidden" id="overlay">
      <h2 id="overlay-msg"></h2>
      <button class="btn" onclick="game.reset()">Try Again</button>
    </div>
  </div>
  <p class="message">Use arrow keys or swipe to play</p>
</div>

<script>
const TILE_COLORS = {
  2:    { bg: '#eee4da', fg: '#776e65', size: 38 },
  4:    { bg: '#ede0c8', fg: '#776e65', size: 38 },
  8:    { bg: '#f2b179', fg: '#f9f6f2', size: 38 },
  16:   { bg: '#f59563', fg: '#f9f6f2', size: 38 },
  32:   { bg: '#f67c5f', fg: '#f9f6f2', size: 38 },
  64:   { bg: '#f65e3b', fg: '#f9f6f2', size: 38 },
  128:  { bg: '#edcf72', fg: '#f9f6f2', size: 32 },
  256:  { bg: '#edcc61', fg: '#f9f6f2', size: 32 },
  512:  { bg: '#edc850', fg: '#f9f6f2', size: 32 },
  1024: { bg: '#edc53f', fg: '#f9f6f2', size: 26 },
  2048: { bg: '#edc22e', fg: '#f9f6f2', size: 26 },
};
const DEFAULT_COLOR = { bg: '#3c3a32', fg: '#f9f6f2', size: 22 };

class Game {
  constructor() {
    this.boardEl = document.getElementById('board');
    this.scoreEl = document.getElementById('score');
    this.bestEl = document.getElementById('best');
    this.overlayEl = document.getElementById('overlay');
    this.overlayMsg = document.getElementById('overlay-msg');
    this.best = parseInt(localStorage.getItem('best2048')) || 0;
    this.bestEl.textContent = this.best;
    this.tileEls = [];
    this.reset();
    this.bindInput();
  }

  reset() {
    this.grid = Array.from({ length: 4 }, () => Array(4).fill(0));
    this.score = 0;
    this.won = false;
    this.over = false;
    this.scoreEl.textContent = 0;
    this.overlayEl.classList.add('hidden');
    this.overlayEl.classList.remove('win');
    this.tileEls.forEach(el => el.remove());
    this.tileEls = [];
    this.spawn();
    this.spawn();
    this.render();
  }

  spawn() {
    const empty = [];
    for (let r = 0; r < 4; r++)
      for (let c = 0; c < 4; c++)
        if (this.grid[r][c] === 0) empty.push([r, c]);
    if (!empty.length) return;
    const [r, c] = empty[Math.floor(Math.random() * empty.length)];
    this.grid[r][c] = Math.random() < 0.9 ? 2 : 4;
    return [r, c];
  }

  tilePos(r, c) {
    return { top: 12 + r * 99, left: 12 + c * 99 };
  }

  render(newTiles = [], mergedTiles = []) {
    this.tileEls.forEach(el => el.remove());
    this.tileEls = [];
    for (let r = 0; r < 4; r++) {
      for (let c = 0; c < 4; c++) {
        const val = this.grid[r][c];
        if (!val) continue;
        const el = document.createElement('div');
        el.className = 'tile';
        const color = TILE_COLORS[val] || DEFAULT_COLOR;
        const pos = this.tilePos(r, c);
        el.style.cssText = `top:${pos.top}px;left:${pos.left}px;background:${color.bg};color:${color.fg};font-size:${color.size}px;`;
        el.textContent = val;
        if (newTiles.some(([nr, nc]) => nr === r && nc === c)) {
          el.classList.add('new');
        }
        if (mergedTiles.some(([mr, mc]) => mr === r && mc === c)) {
          el.classList.add('merge-pop');
        }
        this.boardEl.appendChild(el);
        this.tileEls.push(el);
      }
    }
  }

  slide(row) {
    let arr = row.filter(v => v !== 0);
    const merged = [];
    for (let i = 0; i < arr.length - 1; i++) {
      if (arr[i] === arr[i + 1]) {
        arr[i] *= 2;
        this.score += arr[i];
        if (arr[i] === 2048) this.won = true;
        arr[i + 1] = 0;
        merged.push(i);
        i++;
      }
    }
    arr = arr.filter(v => v !== 0);
    while (arr.length < 4) arr.push(0);
    return { result: arr, merged };
  }

  move(dir) {
    if (this.over) return;
    const prev = this.grid.map(r => [...r]);
    const mergedPositions = [];

    if (dir === 'left' || dir === 'right') {
      for (let r = 0; r < 4; r++) {
        let row = [...this.grid[r]];
        if (dir === 'right') row.reverse();
        const { result, merged } = this.slide(row);
        if (dir === 'right') {
          result.reverse();
          merged.forEach((_, idx) => { merged[idx] = 3 - merged[idx]; });
        }
        this.grid[r] = result;
        merged.forEach(c => mergedPositions.push([r, c]));
      }
    } else {
      for (let c = 0; c < 4; c++) {
        let col = [this.grid[0][c], this.grid[1][c], this.grid[2][c], this.grid[3][c]];
        if (dir === 'down') col.reverse();
        const { result, merged } = this.slide(col);
        if (dir === 'down') {
          result.reverse();
          merged.forEach((_, idx) => { merged[idx] = 3 - merged[idx]; });
        }
        for (let r = 0; r < 4; r++) this.grid[r][c] = result[r];
        merged.forEach(r => mergedPositions.push([r, c]));
      }
    }

    const changed = this.grid.some((row, r) => row.some((v, c) => v !== prev[r][c]));
    if (!changed) return;

    this.scoreEl.textContent = this.score;
    if (this.score > this.best) {
      this.best = this.score;
      this.bestEl.textContent = this.best;
      localStorage.setItem('best2048', this.best);
    }

    const spawned = this.spawn();
    const newTiles = spawned ? [spawned] : [];
    this.render(newTiles, mergedPositions);

    if (this.won && !this.shownWin) {
      this.shownWin = true;
      this.overlayMsg.textContent = 'You Win!';
      this.overlayEl.classList.remove('hidden');
      this.overlayEl.classList.add('win');
    } else if (this.isGameOver()) {
      this.over = true;
      this.overlayMsg.textContent = 'Game Over!';
      this.overlayEl.classList.remove('hidden');
    }
  }

  isGameOver() {
    for (let r = 0; r < 4; r++)
      for (let c = 0; c < 4; c++) {
        if (this.grid[r][c] === 0) return false;
        if (c < 3 && this.grid[r][c] === this.grid[r][c + 1]) return false;
        if (r < 3 && this.grid[r][c] === this.grid[r + 1][c]) return false;
      }
    return true;
  }

  bindInput() {
    document.addEventListener('keydown', e => {
      const map = { ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right' };
      if (map[e.key]) { e.preventDefault(); this.move(map[e.key]); }
    });

    let startX, startY;
    const board = this.boardEl;
    board.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
    });
    board.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - startX;
      const dy = e.changedTouches[0].clientY - startY;
      const absDx = Math.abs(dx), absDy = Math.abs(dy);
      if (Math.max(absDx, absDy) < 30) return;
      if (absDx > absDy) this.move(dx > 0 ? 'right' : 'left');
      else this.move(dy > 0 ? 'down' : 'up');
    });
  }
}

const game = new Game();
</script>
</body>
</html>
